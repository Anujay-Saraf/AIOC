<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>AI Incident Command Center</title>
<style>
:root{--bg:#060b16;--panel:rgba(16,25,47,.82);--panel2:rgba(24,37,68,.86);--text:#edf4ff;--muted:#9fb1cf;--accent:#7dd3fc;--line:rgba(125,211,252,.28)}*{box-sizing:border-box}html,body,#app{height:100%;margin:0}body{font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Arial;background:radial-gradient(circle at 15% 10%,#18315e 0,#060b16 34%),linear-gradient(120deg,#060b16,#0d1326);color:var(--text)}button,input,textarea{font:inherit}button{border:0;border-radius:14px;padding:12px 16px;background:linear-gradient(135deg,#38bdf8,#6366f1);color:white;font-weight:700;cursor:pointer;box-shadow:0 12px 35px rgba(56,189,248,.22)}button.ghost{background:rgba(255,255,255,.08);box-shadow:none;border:1px solid rgba(255,255,255,.12)}.page{min-height:100%;display:grid;grid-template-columns:280px 1fr}.side{padding:26px;border-right:1px solid rgba(255,255,255,.09);background:rgba(4,8,18,.7);backdrop-filter:blur(18px)}.brand{font-size:24px;font-weight:900;letter-spacing:-.04em}.brand span{color:var(--accent)}.nav{display:grid;gap:10px;margin-top:34px}.nav a{color:var(--muted);text-decoration:none;padding:12px 14px;border-radius:14px}.nav a.active,.nav a:hover{background:rgba(125,211,252,.12);color:var(--text)}.main{padding:28px;display:grid;gap:24px}.hero{border:1px solid rgba(125,211,252,.22);background:linear-gradient(135deg,rgba(18,31,60,.92),rgba(11,17,32,.92));border-radius:28px;padding:28px;box-shadow:0 28px 90px rgba(0,0,0,.4);position:relative;overflow:hidden}h1{font-size:clamp(34px,6vw,74px);line-height:.92;margin:0 0 14px;letter-spacing:-.07em}.subtitle{color:var(--muted);max-width:900px;font-size:18px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}.card{grid-column:span 4;background:var(--panel);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:20px;box-shadow:0 18px 55px rgba(0,0,0,.25)}.card.wide{grid-column:span 8}.card.full{grid-column:1/-1}.kpi{font-size:36px;font-weight:900}.muted{color:var(--muted)}.periods{display:flex;gap:10px;flex-wrap:wrap}.periods button.active{background:linear-gradient(135deg,#22c55e,#14b8a6)}.scenario{display:block;width:100%;text-align:left;margin:8px 0;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);box-shadow:none}.scenario strong{display:block}.chat{display:grid;grid-template-columns:1fr auto;gap:12px;margin-top:18px}.chat input,.upload textarea{width:100%;background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.13);border-radius:16px;padding:14px}.answer{white-space:pre-wrap;margin-top:16px;padding:18px;border-radius:18px;background:rgba(0,0,0,.24);border:1px solid rgba(125,211,252,.15)}.flow{display:flex;align-items:center;gap:12px;overflow:auto;padding:14px 4px}.node{min-width:190px;padding:16px;border-radius:18px;background:var(--panel2);border:1px solid var(--line)}.edge{min-width:160px;color:var(--muted);font-size:12px;text-align:center}.edge:before{content:'→';display:block;color:var(--accent);font-size:28px}.list{display:grid;gap:10px}.pill{display:inline-flex;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:5px 10px;color:var(--muted);font-size:12px}.upload{display:grid;gap:12px}.incident-row{display:flex;justify-content:space-between;gap:12px;padding:12px;border-radius:14px;background:rgba(255,255,255,.06);cursor:pointer}.incident-row:hover{background:rgba(125,211,252,.12)}@media(max-width:900px){.page{grid-template-columns:1fr}.card,.card.wide{grid-column:1/-1}}
</style></head><body><div id="app"></div><script>
const token='local-dev-token';let state={period:'week',analytics:null,incidents:[],scenarios:[],selected:null,journey:null,answer:'',status:null};
async function get(url){const r=await fetch(url,{headers:{'x-api-key':token}});if(!r.ok)throw new Error(await r.text());return r.json()}
async function post(url,body){const r=await fetch(url,{method:'POST',headers:{'content-type':'application/json','x-api-key':token},body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());return r.json()}
async function load(){try{state.status=await get('/api/jarvis/status');state.analytics=await get('/api/analytics/incidents?period='+state.period);state.incidents=await get('/api/incidents');state.scenarios=(await get('/api/scenarios')).scenarios;render()}catch(e){document.querySelector('#app').innerHTML='<pre>'+e.message+'</pre>'}}
async function period(p){state.period=p;state.analytics=await get('/api/analytics/incidents?period='+p);render()}
async function trigger(sc){const inc=await post('/api/incidents/trigger',{service:sc.service,severity:'critical',alert_description:sc.description,alert_tier:'high_impact'});state.selected=inc;state.incidents=[inc,...state.incidents];await openIncident(inc.incident_id)}
async function openIncident(id){state.selected=await get('/api/incidents/'+id);state.journey=await get('/api/incidents/'+id+'/journey');location.hash='incident';render()}
async function ask(){const el=document.querySelector('#ask');const q=el?el.value:'';if(!q.trim())return;const a=await post('/api/assistant/chat',{message:q,incident_id:state.selected?.incident_id||''});state.answer=a.answer+'\n\nRoute: '+a.routing.provider+'/'+a.routing.model+' ('+a.routing.tier+')';render()}
async function upload(){const txt=document.querySelector('#logtext').value;if(!txt.trim())return;const r=await post('/api/incidents/upload-log',{text:txt});state.selected=r.incident;state.journey=r.journey;state.answer='Uploaded log analyzed. '+r.resolution.summary+'\nSteps: '+r.resolution.steps.join(' | ');location.hash='incident';render()}
function layout(content){return `<div class="page"><aside class="side"><div class="brand">Jarvis <span>AIOC</span></div><div class="muted">Real-time multi-agent incident response command center</div><nav class="nav"><a href="#" class="${!location.hash?'active':''}">Dashboard</a><a href="#jarvis" class="${location.hash=='#jarvis'?'active':''}">Jarvis Brain</a><a href="#incident" class="${location.hash=='#incident'?'active':''}">Agent Journey</a></nav></aside><main class="main">${content}</main></div>`}
function dashboard(){const a=state.analytics||{};return layout(`<section class="hero"><h1>Incident Response, but alive.</h1><p class="subtitle">Daily, weekly and monthly analytics are backed by live memory; when data is sparse, relatable synthetic incidents fill the dashboard so demos still tell a complete story.</p></section><section class="grid"><div class="card"><div class="muted">Incidents</div><div class="kpi">${a.total||0}</div></div><div class="card"><div class="muted">Resolved</div><div class="kpi">${a.resolved||0}</div></div><div class="card"><div class="muted">Impact / min</div><div class="kpi">$${a.impact_per_minute||0}</div></div><div class="card wide"><h2>Analytics window</h2><div class="periods">${['day','week','month'].map(p=>`<button onclick="period('${p}')" class="${state.period==p?'active':'ghost'}">${p.toUpperCase()}</button>`).join('')}</div><p class="muted">Services: ${(a.service_buckets||[]).map(x=>x.label+' '+x.count).join(', ')||'none'}</p><p class="muted">Resolution: ${(a.resolution_buckets||[]).map(x=>x.label+' '+x.count).join(', ')||'none'}</p></div><div class="card"><h2>Scenarios</h2>${state.scenarios.map(sc=>`<button class="scenario" onclick='trigger(${JSON.stringify(sc)})'><strong>${sc.title}</strong><span>${sc.service} - ${sc.description}</span></button>`).join('')}</div><div class="card full upload"><h2>Upload or paste logs</h2><textarea id="logtext" rows="5" placeholder="Paste ERROR / timeout / DB pool / GC logs here. The system will create an analyzed incident, resolution, and agent journey."></textarea><button onclick="upload()">Analyze uploaded logs</button></div><div class="card full"><h2>Live incidents</h2><div class="list">${state.incidents.map(i=>`<div class="incident-row" onclick="openIncident('${i.incident_id}')"><b>${i.service}</b><span class="muted">${i.alert_description||''}</span><span class="pill">${i.current_status}</span></div>`).join('')||'<span class="muted">No live incidents yet. Trigger a scenario above.</span>'}</div></div></section>`)}
function jarvis(){return layout(`<section class="hero"><h1>Jarvis Brain</h1><p class="subtitle">Ask for a resolution, blast radius, owner, root cause, impact, or escalation. Jarvis uses incident memory, graph context, RAG and LLM routing when configured.</p><div class="chat"><input id="ask" placeholder="How do I resolve the payment-api incident?" onkeydown="if(event.key==='Enter')ask()"/><button onclick="ask()">Ask Jarvis</button></div><div class="answer">${state.answer||'Try: Give me the resolution for the latest payment-api incident.'}</div></section><section class="grid"><div class="card"><h2>Brain route</h2><p class="muted">Provider: ${state.status?.routing?.provider||'heuristic/local'}</p><p class="muted">Ollama: ${state.status?.ollama?.ok?'online':'not connected'}</p></div><div class="card wide"><h2>Current context</h2><p class="muted">${state.selected?state.selected.service+' - '+state.selected.alert_description:'No incident selected. Jarvis will search live and memory incidents.'}</p></div></section>`)}
function incident(){const j=state.journey?.journey;const res=state.journey?.resolution;return layout(`<section class="hero"><h1>Agent Journey</h1><p class="subtitle">A LangGraph-style journey: each node shows which agent acted, where it handed off next, and why.</p></section><section class="grid"><div class="card full"><h2>Flow graph</h2><div class="flow">${j?j.nodes.map((n,i)=>`<div class="node"><b>${n.label}</b><div class="pill">${n.status}</div></div>${j.edges[i]?`<div class="edge">${j.edges[i].reason}</div>`:''}`).join(''):'<span class="muted">Select or trigger an incident to see the flow.</span>'}</div></div><div class="card wide"><h2>Resolution</h2><p>${res?.summary||'No resolution selected yet.'}</p><ol>${(res?.steps||[]).map(x=>`<li>${x}</li>`).join('')}</ol><p class="muted">Owner: ${res?.owner||'n/a'} - Approval required: ${res?.approval_required?'yes':'no'} - Safety: ${res?.safety_check||'n/a'}</p></div><div class="card"><h2>Incident</h2><p>${state.selected?.service||'None selected'}</p><p class="muted">${state.selected?.alert_description||''}</p></div></section>`)}
function render(){const h=location.hash;document.querySelector('#app').innerHTML=h=='#jarvis'?jarvis():h=='#incident'?incident():dashboard()}window.onhashchange=render;load();
</script></body></html>
